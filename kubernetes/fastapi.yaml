apiVersion: apps/v1
kind: Deployment

metadata:
  name: fastapi-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: fastapi-demo

  template:
    metadata:
      labels:
        app: fastapi-demo

    spec:
      containers:
        - name: fastapi-demo

          image: fastapi-demo:v1

          imagePullPolicy: Never

          env:
            - name: PROJECT_NAME
              value: "AI DevOps Demo"

            - name: POSTGRES_SERVER
              value: "localhost"

            - name: POSTGRES_USER
              value: "admin"

            - name: FIRST_SUPERUSER
              value: "admin@example.com"

            - name: FIRST_SUPERUSER_PASSWORD
              value: "admin123"

          ports:
            - containerPort: 8000

---
apiVersion: v1
kind: Service

metadata:
  name: fastapi-service

spec:
  type: NodePort

  selector:
    app: fastapi-demo

  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30080